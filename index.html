<style>
:root{
  --vert:#2d6a4f;--vert-f:#1a3a2a;--vert-c:#52b788;--vert-p:#e8f5e9;
  --gris:#6b7280;--bord:#e5e7eb;--danger:#c0392b;--warn:#d68910;
  --bg:#f5f7f2;--card:#fff;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:#1f2937;min-height:100dvh}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--vert-f);color:#fff;
  padding:env(safe-area-inset-top) 0 0;
}
.topbar-inner{display:flex;align-items:center;gap:10px;padding:.75rem 1rem}
.topbar-logo{font-size:1.4rem}
.topbar-title{font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
.topbar-sub{font-size:.7rem;opacity:.7;margin-top:1px}
.topbar-status{margin-left:auto;font-size:.7rem;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.15)}
.topbar-status.ok{background:rgba(82,183,136,.35)}
.topbar-status.err{background:rgba(192,57,43,.35)}

/* ── TABS ── */
.tabs{display:flex;background:var(--vert-f);border-top:1px solid rgba(255,255,255,.1)}
.tab{flex:1;padding:.6rem .3rem;text-align:center;font-size:.7rem;font-weight:600;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;border-bottom:2px solid transparent}
.tab.active{color:#fff;border-bottom-color:var(--vert-c)}

/* ── SCROLL AREA ── */
.scroll{overflow-y:auto;padding:1rem;padding-bottom:calc(1rem + env(safe-area-inset-bottom))}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--r);padding:1rem;margin-bottom:.75rem;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gris);margin-bottom:.6rem}
.lot-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.lot-name{font-size:1.05rem;font-weight:700;color:var(--vert-f)}
.lot-badge{font-size:.75rem;font-weight:600;background:var(--vert-p);color:var(--vert);padding:3px 10px;border-radius:20px}
.lot-sub{font-size:.75rem;color:var(--gris);margin-bottom:.6rem}

/* ── ALIMENTS LIST ── */
.alim-row{display:flex;align-items:center;gap:.6rem;padding:.5rem 0;border-bottom:1px solid var(--bord)}
.alim-row:last-child{border-bottom:none}
.alim-num{font-size:1.1rem;font-weight:700;color:var(--vert);width:22px;text-align:center;flex-shrink:0}
.alim-info{flex:1}
.alim-name{font-size:.9rem;font-weight:600}
.alim-cat{font-size:.7rem;color:var(--gris)}
.alim-qte{text-align:right;flex-shrink:0}
.alim-qte-val{font-size:1.15rem;font-weight:700;color:var(--vert-f);font-family:monospace}
.alim-qte-unit{font-size:.7rem;color:var(--gris)}

/* ── TOTAL ROW ── */
.total-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem .6rem;background:var(--vert-p);border-radius:8px;margin-top:.5rem}
.total-label{font-size:.8rem;font-weight:700;color:var(--vert-f)}
.total-val{font-size:1rem;font-weight:700;color:var(--vert-f);font-family:monospace}

/* ── PASSAGE CHIPS ── */
.passage-chips{display:flex;gap:.4rem;margin-bottom:.7rem;flex-wrap:wrap}
.chip{padding:.3rem .8rem;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--bord);background:#fff;color:var(--gris);transition:all .15s}
.chip.active{background:var(--vert-f);color:#fff;border-color:var(--vert-f)}

/* ── REFUS FORM ── */
.refus-form{display:flex;gap:.5rem;align-items:center;margin-top:.6rem;padding:.5rem .6rem;background:#fafafa;border-radius:8px}
.refus-label{font-size:.8rem;color:var(--gris);flex:1}
.refus-input{width:70px;padding:.35rem .5rem;border:1.5px solid var(--bord);border-radius:8px;font-size:.95rem;font-weight:600;text-align:center;font-family:monospace}
.refus-input:focus{outline:none;border-color:var(--vert-c)}
.refus-unit{font-size:.75rem;color:var(--gris)}
.btn-save{background:var(--vert-f);color:#fff;border:none;border-radius:8px;padding:.4rem .9rem;font-size:.8rem;font-weight:600;cursor:pointer}
.btn-save:active{opacity:.75}

/* ── STATUT DISTRIBUTION ── */
.distrib-status{display:flex;align-items:center;gap:.5rem;padding:.45rem .7rem;border-radius:8px;font-size:.8rem;font-weight:600;margin-top:.5rem;cursor:pointer}
.distrib-status.fait{background:#e8f5e9;color:var(--vert)}
.distrib-status.encours{background:#fff8e1;color:var(--warn)}
.distrib-status.todo{background:#f5f5f5;color:var(--gris)}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--vert-f);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;z-index:999}
.login-logo{font-size:3rem;margin-bottom:.5rem}
.login-title{font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:.3rem}
.login-sub{font-size:.85rem;color:rgba(255,255,255,.6);margin-bottom:2rem;text-align:center}
.login-input{width:100%;padding:.9rem 1rem;border-radius:12px;border:none;font-size:1rem;margin-bottom:.75rem;background:rgba(255,255,255,.1);color:#fff}
.login-input::placeholder{color:rgba(255,255,255,.4)}
.login-input:focus{outline:none;background:rgba(255,255,255,.15)}
.login-btn{width:100%;padding:.9rem;border-radius:12px;border:none;background:var(--vert-c);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .15s}
.login-btn:active{opacity:.8}
.login-error{color:#ff8a80;font-size:.85rem;text-align:center;margin-top:.5rem;min-height:20px}

/* ── LOADING ── */
.loading{text-align:center;padding:3rem 1rem;color:var(--gris)}
.spinner{width:36px;height:36px;border:3px solid var(--bord);border-top-color:var(--vert);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY ── */
.empty{text-align:center;padding:3rem 1rem;color:var(--gris);font-size:.9rem}

/* ── BADGE CAT ── */
.badge{font-size:.65rem;font-weight:600;padding:1px 6px;border-radius:20px}
.b-fourr{background:#e8f5e9;color:#1b5e20}
.b-conc{background:#e8eaf6;color:#1a237e}
.b-comp{background:#e3f2fd;color:#0d47a1}
.b-autre{background:#f3e5f5;color:#4a148c}

/* ── SYNC BANNER ── */
.sync-banner{background:var(--vert-p);border-left:3px solid var(--vert-c);padding:.5rem .8rem;font-size:.75rem;color:var(--vert);margin-bottom:.75rem;border-radius:0 8px 8px 0;display:flex;align-items:center;gap:.4rem}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(1rem + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--vert-f);color:#fff;padding:.6rem 1.2rem;border-radius:20px;font-size:.8rem;font-weight:600;z-index:500;animation:fadeInOut 2.5s forwards}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(8px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">🐐</div>
  <div class="login-title">CAPRation</div>
  <div class="login-sub">Distribution mobile<br>Connexion avec vos identifiants CapriScan</div>
  <input class="login-input" id="l-email" type="email" placeholder="Email" autocomplete="email">
  <input class="login-input" id="l-pwd" type="password" placeholder="Mot de passe" autocomplete="current-password">
  <button class="login-btn" onclick="doLogin()">Se connecter</button>
  <div class="login-error" id="l-err"></div>
</div>

<!-- APP -->
<div id="app" style="display:none;height:100dvh;display:none;flex-direction:column">

  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-logo">🐐</div>
      <div>
        <div class="topbar-title">CAPRation</div>
        <div class="topbar-sub">Distribution mobile</div>
      </div>
      <div class="topbar-status" id="sync-status">Connexion…</div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="showTab('rations')" id="tab-rations">🌾 Rations</div>
      <div class="tab" onclick="showTab('chargement')" id="tab-chargement">📋 Chargement</div>
      <div class="tab" onclick="showTab('distribution')" id="tab-distribution">🪣 Distribution</div>
      <div class="tab" onclick="showTab('refus')" id="tab-refus">📋 Refus</div>
    </div>
  </div>

  <div class="scroll" id="scroll-area">
    <!-- Rations -->
    <div id="page-rations">
      <div class="loading"><div class="spinner"></div>Chargement des rations…</div>
    </div>
    <!-- Chargement -->
    <div id="page-chargement" style="display:none">
      <div class="loading"><div class="spinner"></div>Chargement…</div>
    </div>
    <!-- Distribution -->
    <div id="page-distribution" style="display:none">
      <div class="loading"><div class="spinner"></div>Chargement…</div>
    </div>
    <!-- Refus -->
    <div id="page-refus" style="display:none">
      <div class="loading"><div class="spinner"></div>Chargement…</div>
    </div>
  </div>
</div>

<script type="module">
// ══════════════════════════════════════════════════
// FIREBASE CONFIG
// ══════════════════════════════════════════════════
const FB_CONFIG = {
  apiKey:            "AIzaSyCfnYILKnS9jF4vpxy9JZiNs9TZHfBtJzI",
  authDomain:        "capriscan.firebaseapp.com",
  projectId:         "capriscan",
  storageBucket:     "capriscan.firebasestorage.app",
  messagingSenderId: "928490915599",
  appId:             "1:928490915599:web:6613db0af99ec2f2a7e07a"
};

import {initializeApp}    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {getAuth,signInWithEmailAndPassword,onAuthStateChanged,signOut}
                           from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {getFirestore,doc,getDoc,setDoc,collection,getDocs,serverTimestamp}
                           from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app  = initializeApp(FB_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

let uid = null;
let lotsData   = [];   // [{id,nom,nb,ration:[{nom,cat,qte,qteRefus}]}]
let refusData  = {};   // {date: {lotId: {valeur,kg,pct}}}

// ══ AUTH ══
onAuthStateChanged(auth, async user=>{
  if(user){
    uid = user.uid;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    setSyncStatus('Synchronisation…','');
    await chargerDonnees();
    setSyncStatus('Synchronisé ✓','ok');
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

window.doLogin = async()=>{
  const email = document.getElementById('l-email').value.trim();
  const pwd   = document.getElementById('l-pwd').value;
  document.getElementById('l-err').textContent='';
  try{
    await signInWithEmailAndPassword(auth, email, pwd);
  } catch(e){
    document.getElementById('l-err').textContent = 'Email ou mot de passe incorrect.';
  }
};

// ══ DONNÉES ══
async function chargerDonnees(){
  try{
    // 1. Charger les lots et rations depuis Firestore (chemin CAPRation)
    const lotDoc = await getDoc(doc(db,`users/${uid}/capration/lots`));
    if(lotDoc.exists()){
      lotsData = lotDoc.data().lots || [];
    } else {
      // Fallback : essayer de lire les noms de lots CapriScan
      const nomDoc = await getDoc(doc(db,`users/${uid}/data/lotNoms`));
      if(nomDoc.exists()){
        const noms = nomDoc.data().noms||{};
        lotsData = Object.entries(noms).map(([k,v])=>({id:+k,nom:v,nb:0,ration:[]}));
      }
    }

    // 2. Charger les refus du jour
    const today = todayStr();
    const refDoc = await getDoc(doc(db,`users/${uid}/capration/refus_${today}`));
    if(refDoc.exists()) refusData = refDoc.data()||{};
    // Charger l'historique 7 jours en arrière-plan
    chargerHistoriqueRefus();

    renderAll();
  } catch(e){
    setSyncStatus('Erreur sync','err');
    console.error(e);
    // Charger depuis localStorage si dispo
    const local = localStorage.getItem('cap3_mobile_lots');
    if(local) lotsData = JSON.parse(local);
    renderAll();
  }
}

// ══ TABS ══
window.showTab = (tab)=>{
  ['rations','chargement','distribution','refus'].forEach(t=>{
    document.getElementById(`page-${t}`).style.display = t===tab?'':'none';
    document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
  });
};

// ══ RENDER ALL ══
function renderAll(){
  renderRations();
  try{ renderChargement(); } catch(e){ console.error('renderChargement:', e); document.getElementById('page-chargement').innerHTML=`<div class="card" style="color:red;padding:1rem">Erreur: ${e.message}</div>`; }
  try{ renderDistribution(); } catch(e){ console.error('renderDistribution:', e); document.getElementById('page-distribution').innerHTML=`<div class="card" style="color:red;padding:1rem">Erreur: ${e.message}</div>`; }
  renderRefus();
}

// ══════════════════════════════════════════════════
// PAGE RATIONS
// ══════════════════════════════════════════════════
function renderRations(){
  const el = document.getElementById('page-rations');
  if(!lotsData.length){
    el.innerHTML=`<div class="empty">🌿<br>Aucune ration disponible.<br><small>Synchronisez depuis CAPRation PC</small></div>`;
    return;
  }

  const lotsAvecRation = lotsData.filter(l=>l.ration?.length>0);
  if(!lotsAvecRation.length){
    el.innerHTML=`<div class="empty">🌿<br>Aucune ration configurée.<br><small>Créez des rations dans CAPRation PC</small></div>`;
    return;
  }

  el.innerHTML = `
    <div class="sync-banner">🔄 Rations synchronisées depuis CAPRation PC</div>
    ${lotsAvecRation.map(lot=>renderLotRation(lot)).join('')}`;
}

function catBadge(cat){
  if(['Foin','Ensilage','Enrubannage','Herbe','Paille'].includes(cat)) return 'b-fourr';
  if(cat==='Concentré') return 'b-conc';
  if(cat==='Aliment composé') return 'b-comp';
  return 'b-autre';
}

function renderLotRation(lot){
  const ORDRE = {'Paille':1,'Foin':2,'Enrubannage':3,'Ensilage':4,'Herbe':5,'Aliment composé':6,'Concentré':7,'Autre':8};
  const items = [...(lot.ration||[])].sort((a,b)=>(ORDRE[a.cat]||9)-(ORDRE[b.cat]||9));
  const total = items.reduce((s,a)=>s+a.qte,0);

  return `<div class="card">
    <div class="lot-header">
      <div class="lot-name">${lot.nom}</div>
      <div class="lot-badge">${lot.nb||0} ch.</div>
    </div>
    <div class="lot-sub">${items.length} aliment${items.length>1?'s':''} · ${total.toFixed(2)} kg brut/tête/j</div>
    ${items.map((a,i)=>`
    <div class="alim-row">
      <div class="alim-num">${i+1}</div>
      <div class="alim-info">
        <div class="alim-name">${a.nom}</div>
        <div class="alim-cat"><span class="badge ${catBadge(a.cat)}">${a.cat}</span></div>
      </div>
      <div class="alim-qte">
        <div class="alim-qte-val">${a.qte.toFixed(2)}</div>
        <div class="alim-qte-unit">kg/tête</div>
      </div>
    </div>`).join('')}
    <div class="total-row">
      <div class="total-label">Total lot (${lot.nb||0} têtes)</div>
      <div class="total-val">${((total)*(lot.nb||0)).toFixed(0)} kg/j</div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════
// PAGE DISTRIBUTION — 1 bol / jour
// ══════════════════════════════════════════════════
// ── Temps de mélange par catégorie (modifiables) ──
const TEMPS_DEFAUT = {'Paille':4,'Foin':4,'Enrubannage':3,'Ensilage':3,'Herbe':3,'Aliment composé':2,'Concentré':2,'Autre':2};
function getTemps(){ try{ return {...TEMPS_DEFAUT,...JSON.parse(localStorage.getItem('capration_bol_temps')||'{}')}; }catch(e){ return {...TEMPS_DEFAUT}; } }
function setTemps(obj){ localStorage.setItem('capration_bol_temps', JSON.stringify(obj)); }

// ── État des coches bol (persistant localStorage) ──
function getBolChecked(){ try{ return JSON.parse(localStorage.getItem('capration_bol_checked')||'{}'); }catch(e){ return {}; } }
function setBolChecked(obj){ localStorage.setItem('capration_bol_checked', JSON.stringify(obj)); }
function getAjustFacteurs(){ try{ return JSON.parse(sessionStorage.getItem('capration_ajust_facteurs')||'{}'); }catch(e){ return {}; } }
function setAjustFacteurs(obj){ sessionStorage.setItem('capration_ajust_facteurs', JSON.stringify(obj)); }
function getDecompte(){ try{ return JSON.parse(sessionStorage.getItem('capration_decompte')||'{}'); }catch(e){ return {}; } }
function setDecompte(obj){ sessionStorage.setItem('capration_decompte', JSON.stringify(obj)); }

// ── État des lots actifs (persistant localStorage) ──
function getLotsActifs(){ try{ return JSON.parse(localStorage.getItem('capration_lots_actifs')||'{}'); }catch(e){ return {}; } }
function setLotsActifs(obj){ localStorage.setItem('capration_lots_actifs', JSON.stringify(obj)); }
window.toggleLotActif = function(lotId){
  const actifs = getLotsActifs();
  actifs[lotId] = !actifs[lotId];
  setLotsActifs(actifs);
  renderDistribution();
  renderChargement();
};
window.toggleBolItem = function(nom){
  const checked = getBolChecked();
  checked[nom] = !checked[nom];
  setBolChecked(checked);
  renderDistribution();
  renderChargement();
};

window.toggleLotServi = function(lotId){
  const d = getDecompte();
  d[lotId] = !d[lotId];
  setDecompte(d);
  renderDistribution();
};

window.resetDecompte = function(){
  sessionStorage.removeItem('capration_decompte');
  renderDistribution();
};

window.saveTempsModal = function(){
  const t = {};
  document.querySelectorAll('#temps-modal-overlay input[data-cat]').forEach(inp=>{
    t[inp.dataset.cat] = parseInt(inp.value)||0;
  });
  setTemps(t);
  document.getElementById('temps-modal-overlay').remove();
  renderChargement();
};

window.openTempsModal = function(){
  const temps = getTemps();
  const cats = Object.keys(TEMPS_DEFAUT);
  const overlay = document.createElement('div');
  overlay.id = 'temps-modal-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px;padding:1.2rem;width:100%;max-width:380px;max-height:85dvh;overflow-y:auto">
      <div style="font-weight:700;font-size:1rem;margin-bottom:1rem;color:var(--vert-f)">⏱️ Temps de mélange par catégorie</div>
      <div style="font-size:.78rem;color:var(--gris);margin-bottom:1rem">Durée de mélange <b>après chaque ajout</b> de cette catégorie au bol.</div>
      ${cats.map(cat=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid #f0f0f0">
          <span style="font-size:.9rem;font-weight:500">${cat}</span>
          <div style="display:flex;align-items:center;gap:.4rem">
            <button onclick="this.nextElementSibling.stepDown()" style="width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:#f5f5f5;font-size:1rem;cursor:pointer;line-height:1">−</button>
            <input type="number" data-cat="${cat}" value="${temps[cat]??2}" min="0" max="30" style="width:48px;text-align:center;border:1px solid #ddd;border-radius:8px;padding:4px;font-size:.95rem;font-weight:600">
            <button onclick="this.previousElementSibling.stepUp()" style="width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:#f5f5f5;font-size:1rem;cursor:pointer;line-height:1">+</button>

// ── Données consolidées (communes aux deux pages) ──
function getConsolide(){
  // Source de vérité : ration brute depuis Firebase, jamais modifiée
  // lot.ration peut être un array (mobile) ou un objet {id:qte} (PC) — on normalise
  function getRationArray(lot){
    if(!lot.ration) return [];
    if(Array.isArray(lot.ration)) return lot.ration.filter(a=>a.qte>0);
    // Format PC : objet {id: qte}
    return Object.entries(lot.ration)
      .filter(([,qte])=>qte>0)
      .map(([id,qte])=>({id:+id, nom:String(id), qte, cat:'', ms:100, ufl:0, pdin:0}));
  }
  const lotsAvecRation = lotsData.filter(l=>{
    if(Array.isArray(l.ration)) return l.ration.length>0;
    return l.ration && typeof l.ration==='object' && Object.keys(l.ration).length>0;
  });
  const actifs = getLotsActifs();
  lotsAvecRation.forEach(l=>{ if(actifs[l.id]===undefined) actifs[l.id]=true; });
  setLotsActifs(actifs);
  const lotsActifs = lotsAvecRation.filter(l=>actifs[l.id]);
  const consolide = {};
  let nbTotal = 0;
  lotsActifs.forEach(lot=>{
    const nb=lot.nb||0; nbTotal+=nb;
    (lot.ration||[]).forEach(a=>{
      if(!consolide[a.nom]) consolide[a.nom]={...a,qteTotal:0};
      consolide[a.nom].qteTotal += a.qte*(nb||1); // quantités brutes, sans facteur
    });
  });
  const ORDRE = {'Paille':1,'Foin':2,'Enrubannage':3,'Ensilage':4,'Herbe':5,'Aliment composé':6,'Concentré':7,'Autre':8};
  const items = Object.values(consolide).sort((a,b)=>(ORDRE[a.cat]||9)-(ORDRE[b.cat]||9));
  return {items, nbTotal, lotsAvecRation, lotsActifs};
}

// ── Calcul du facteur refus pour un lot ──
function getFacteurLot(lotId){
  const aj = getAjustFacteurs()[lotId];
  return aj?.facteur || 1;
}

// ── Quantité ajustée d'un aliment bol pour un lot ──
// appliquer le facteur refus uniquement si l'aliment est coché au bol
function qteAjustee(nomAliment, qteBase, lotId){
  const checked = getBolChecked();
  const isBol = checked[nomAliment] !== false;
  return isBol ? qteBase * getFacteurLot(lotId) : qteBase;
}

// ── kg bol d'un lot avec facteur (pour décompte et récap) ──
function kgBolLot(lot){
  const checked = getBolChecked();
  const f = getFacteurLot(lot.id);
  const ration = Array.isArray(lot.ration) ? lot.ration.filter(a=>a.qte>0) : [];
  return ration
    .filter(a=>checked[a.nom]!==false)
    .reduce((s,a)=>s+a.qte*f, 0) * (lot.nb||0);
}

// ── État chrono ──
let chronoState = {
  running: false,
  startTs: null,       // timestamp démarrage chrono global
  etapeIdx: 0,         // étape en cours (index dans itemsBol)
  etapeStartTs: null,  // timestamp début étape courante
  intervalId: null,
  items: [],           // snapshot des étapes au démarrage
};

function chronoTick(){
  const cs = chronoState;
  if(!cs.running) return;
  const now = Date.now();
  const totalSec = Math.floor((now - cs.startTs)/1000);
  const etape = cs.items[cs.etapeIdx];
  if(!etape){ chronoStop(true); return; }
  const etapeDurSec = (etape.tMin||0)*60;
  const etapeEcouleSec = Math.floor((now - cs.etapeStartTs)/1000);
  const etapeResteSec = Math.max(0, etapeDurSec - etapeEcouleSec);

  // Passage automatique à l'étape suivante
  if(etapeDurSec > 0 && etapeEcouleSec >= etapeDurSec){
    cs.etapeIdx++;
    cs.etapeStartTs = now;
    if(cs.etapeIdx >= cs.items.length){ chronoStop(true); return; }
    // Vibration si dispo
    if(navigator.vibrate) navigator.vibrate([200,100,200]);
    soundEtape();
    updateChronoUI(totalSec, etapeResteSec);
    return;
  }
  updateChronoUI(totalSec, etapeResteSec);
}

function fmtTime(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateChronoUI(totalSec, etapeResteSec){
  const cs = chronoState;
  const elTotal = document.getElementById('chrono-total');
  const elEtapeNom = document.getElementById('chrono-etape-nom');
  const elEtapeReste = document.getElementById('chrono-etape-reste');
  const elEtapeBar = document.getElementById('chrono-etape-bar');
  const elEtapeNum = document.getElementById('chrono-etape-num');
  if(!elTotal) return;

  const etape = cs.items[cs.etapeIdx];
  if(!etape) return;

  elTotal.textContent = fmtTime(totalSec);
  elEtapeNom.textContent = etape.nom;
  elEtapeNum.textContent = `Étape ${cs.etapeIdx+1}/${cs.items.length}`;
  if(etape.tMin > 0){
    elEtapeReste.textContent = fmtTime(etapeResteSec);
    const pct = Math.max(0, Math.min(100, (1 - etapeResteSec/(etape.tMin*60))*100));
    elEtapeBar.style.width = pct + '%';
  } else {
    elEtapeReste.textContent = '—';
    elEtapeBar.style.width = '0%';
  }

  // Mettre à jour la timeline
  cs.items.forEach((it, i) => {
    const row = document.getElementById(`chrono-row-${i}`);
    if(!row) return;
    if(i < cs.etapeIdx) row.style.opacity = '0.4';
    else if(i === cs.etapeIdx) { row.style.opacity = '1'; row.style.background = '#e3f2fd'; }
    else row.style.opacity = '0.6';
  });
}

async function chronoStart(){
  const cs = chronoState;
  if(cs.running) return;
  const {items} = getConsolide();
  const checked = getBolChecked();
  const temps = getTemps();
  const itemsBol = items.filter(a=>checked[a.nom]);
  cs.items = itemsBol.map(a=>({nom:a.nom, cat:a.cat, tMin:temps[a.cat]||0}));
  cs.running = true;
  cs.startTs = Date.now();
  cs.etapeStartTs = Date.now();
  cs.etapeIdx = 0;
  cs.intervalId = setInterval(chronoTick, 500);

  // ── Wake Lock : garder l'écran allumé ──
  if('wakeLock' in navigator){
    navigator.wakeLock.request('screen')
      .then(lock=>{ cs.wakeLock = lock; })
      .catch(()=>{});
  }

  // ── Permission notifs + programmation (au tap Start) ──
  await requestNotifPermission();
  scheduleNotifications();

  renderChargement();
}

// ── Demander permission notifications ──
async function requestNotifPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission === 'granted') return true;
  const perm = await Notification.requestPermission();
  return perm === 'granted';
}

// ── Programmer les notifications de chaque étape ──
async function scheduleNotifications(){
  const cs = chronoState;
  if(!await requestNotifPermission()) return;
  // Annuler les anciennes
  (cs.notifTimers||[]).forEach(t=>clearTimeout(t));
  cs.notifTimers = [];

  let cumul = 0;
  cs.items.forEach((etape, i)=>{
    const tMin = etape.tMin||0;
    if(tMin === 0) return;
    cumul += tMin;
    const delayMs = cumul * 60 * 1000;
    const isLast = i === cs.items.length - 1;
    const timer = setTimeout(()=>{
      if(!cs.running) return;
      if(isLast){
        new Notification('🎉 CAPRation — Bol terminé !', {
          body: 'Mélange terminé. Le bol est prêt.',
          icon: 'icon-192.png',
          tag: 'capration-chrono',
          renotify: true
        });
      } else {
        const next = cs.items[i+1];
        new Notification(`⏭ CAPRation — Étape ${i+2}/${cs.items.length}`, {
          body: `Ajouter : ${next.nom} (${next.tMin} min)`,
          icon: 'icon-192.png',
          tag: 'capration-chrono',
          renotify: true
        });
      }
    }, delayMs);
    cs.notifTimers.push(timer);
  });
}

window.ajusterRationMobile = async function(){
  const CIBLE_REFUS = 0.08;
  const checked = getBolChecked();
  const actifs  = getLotsActifs();
  const {lotsAvecRation} = getConsolide();

  if(!lotsAvecRation.length){ showToast("Aucune ration disponible."); return; }

  let nbAjustes=0, nbOK=0, nbSansRefus=0;
  const facteurs = getAjustFacteurs();

  lotsAvecRation.filter(l=>actifs[l.id]!==false).forEach(lot=>{
    const ration = lot.ration||[];
    const alimentsBol = ration.filter(a=>checked[a.nom]!==false);
    if(!alimentsBol.length) return;

    const refusLot = refusData[lot.id];
    if(!refusLot || refusLot.pct==null){ nbSansRefus++; return; }

    const pct = parseFloat(refusLot.pct)/100;
    if(pct>=0.06 && pct<=0.10){ nbOK++; return; }

    const facteur = (1-pct)/(1-CIBLE_REFUS);

    // Stocker UNIQUEMENT le facteur — ne pas modifier lot.ration
    facteurs[lot.id] = {
      facteur: Math.round(facteur*1000)/1000,
      refusPct: parseFloat(refusLot.pct),
      refusKg: parseFloat(refusLot.kg||0),
      date: new Date().toISOString()
    };
    nbAjustes++;
  });

  setAjustFacteurs(facteurs);
  renderChargement();
  renderDistribution();

  if(nbAjustes===0 && nbOK>0)             showToast("✅ Tous les lots sont dans l'objectif 6-10%");
  else if(nbAjustes===0 && nbSansRefus>0) showToast("⚠️ Aucun refus saisi aujourd'hui");
  else showToast(`⚖️ ${nbAjustes} lot(s) ajusté(s) — ration de base inchangée`);
};

// ── Sons Web Audio ──
function getAudioCtx(){
  if(!window._audioCtx) window._audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return window._audioCtx;
}
function playBip(freq, dur, vol){
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol||0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  }catch(e){}
}
function soundEtape(){
  // Deux bips courts — changement d'étape
  playBip(880, 0.12, 0.35);
  setTimeout(()=>playBip(1046, 0.15, 0.35), 140);
}
function soundFin(){
  // Mélodie de fin : do-mi-sol-do
  const notes = [[523,0],[659,180],[784,360],[1046,540]];
  notes.forEach(([f,t])=>setTimeout(()=>playBip(f, 0.45, 0.5), t));
}

window.chronoStop = function(finished){
  const cs = chronoState;
  if(cs.intervalId) clearInterval(cs.intervalId);
  cs.running = false;
  cs.intervalId = null;
  // Relâcher wake lock
  if(cs.wakeLock){ cs.wakeLock.release().catch(()=>{}); cs.wakeLock = null; }
  // Annuler notifs programmées si arrêt manuel
  if(!finished) (cs.notifTimers||[]).forEach(t=>clearTimeout(t));
  cs.notifTimers = [];
  if(finished){
    if(navigator.vibrate) navigator.vibrate([300,100,300,100,300]);
    soundFin();
  }
  renderChargement();
};

window.chronoReset = function(){
  chronoStop(false);
  chronoState.etapeIdx = 0;
  chronoState.startTs = null;
  renderChargement();
};

function renderDistribution(){
  const el = document.getElementById('page-distribution');
  const {items, nbTotal, lotsAvecRation} = getConsolide();
  if(!lotsAvecRation.length){ el.innerHTML=`<div class="empty">🪣<br>Aucune ration configurée.</div>`; return; }

  const checked  = getBolChecked();
  const actifs   = getLotsActifs();
  const decompte = getDecompte();
  const facteurs = getAjustFacteurs();
  const lotsDistrib = lotsAvecRation.filter(l=>actifs[l.id]!==false);
  const nbLotsInactifs = lotsAvecRation.filter(l=>!actifs[l.id]).length;

  // Initialiser checked
  lotsAvecRation.forEach(lot=>(lot.ration||[]).forEach(a=>{ if(checked[a.nom]===undefined) checked[a.nom]=true; }));

  // Totaux avec facteur par lot
  const totalBol   = lotsDistrib.reduce((s,l)=>s+kgBolLot(l), 0);
  const totalRobot = lotsDistrib.reduce((s,l)=>s+(l.ration||[]).filter(a=>checked[a.nom]===false).reduce((sq,a)=>sq+a.qte,0)*(l.nb||0), 0);

  // Décompte : kg déjà servis (cochés)
  const kgServi = lotsDistrib.filter(l=>decompte[l.id]).reduce((s,l)=>s+kgBolLot(l), 0);
  const kgRestant = totalBol - kgServi;
  const nbLotsServis = lotsDistrib.filter(l=>decompte[l.id]).length;
  const nbLotsRestants = lotsDistrib.length - nbLotsServis;
  const decompteActif = nbLotsServis > 0;

  const lotsAvecRefusD = lotsDistrib.filter(l=>refusData[l.id]?.pct!=null);
  const lotsAjustesD = lotsDistrib.filter(l=>facteurs[l.id]);
  const msgRefus = lotsAjustesD.length
    ? `<div style="font-size:.72rem;background:#fff3e0;color:#b7791f;border-radius:6px;padding:3px 9px;margin-bottom:.5rem;font-weight:600">⚖️ Quantités ajustées selon refus</div>`
    : lotsAvecRefusD.length
      ? `<div style="font-size:.72rem;background:#e3f2fd;color:#0d47a1;border-radius:6px;padding:3px 9px;margin-bottom:.5rem">Refus saisis — dans l'objectif, ration inchangée</div>`
      : `<div style="font-size:.72rem;background:#f5f5f5;color:var(--gris);border-radius:6px;padding:3px 9px;margin-bottom:.5rem">Ration de base · Saisir les refus dans l'onglet Refus pour ajuster</div>`;

  el.innerHTML = `
    <!-- DÉCOMPTE BOL -->
    <div class="card" style="border:2px solid ${kgRestant<=0&&decompteActif?'var(--vert-c)':'var(--bord)'}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem">
        <div class="card-title" style="margin-bottom:0">🪣 Décompte bol</div>
        ${decompteActif?`<button onclick="resetDecompte()" style="font-size:.72rem;padding:3px 9px;border-radius:20px;border:1px solid #ddd;background:#f5f5f5;color:var(--gris);cursor:pointer">↺ Reset</button>`:''}
      </div>
      ${msgRefus}
      <div style="text-align:center;margin-bottom:.8rem">
        <div style="font-size:.75rem;color:var(--gris);margin-bottom:.2rem">${decompteActif?'Restant dans le bol':'Total bol à distribuer'}</div>
        <div style="font-family:monospace;font-size:2.8rem;font-weight:800;color:${kgRestant<=0&&decompteActif?'var(--vert-c)':kgRestant<totalBol*0.3&&decompteActif?'#d68910':'var(--vert-f)'};line-height:1">
          ${kgRestant<=0&&decompteActif?'✓ Vide':kgRestant.toFixed(0)+' kg'}
        </div>
        ${decompteActif&&kgRestant>0?`<div style="font-size:.75rem;color:var(--gris);margin-top:.2rem">${kgServi.toFixed(0)} kg distribués · ${nbLotsRestants} lot${nbLotsRestants>1?'s':''} restant${nbLotsRestants>1?'s':''}</div>`:''}
        ${totalBol>0?`<div style="background:#eee;border-radius:20px;height:8px;margin:.6rem 0 0;overflow:hidden">
          <div style="height:100%;background:${kgRestant<=0&&decompteActif?'var(--vert-c)':'var(--vert-f)'};border-radius:20px;width:${decompteActif?Math.max(0,(kgRestant/totalBol)*100).toFixed(1):100}%;transition:width .4s"></div>
        </div>`:''}
      </div>
      <!-- Liste des lots à cocher -->
      <div style="border:1px solid var(--bord);border-radius:10px;overflow:hidden">
        <div style="background:#f8f9fa;padding:.4rem .7rem;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gris)">Cochez après avoir distribué chaque lot</div>
        ${(()=>{
          const kgDejaServi = lotsDistrib.filter(l=>decompte[l.id]).reduce((s,l)=>s+kgBolLot(l), 0);
          const kgRestantActuel = totalBol - kgDejaServi;
          return lotsDistrib.map((lot,i)=>{
            const servi = !!decompte[lot.id];
            const kgLot = kgBolLot(lot);
            const kgApres = servi ? kgRestantActuel : kgRestantActuel - kgLot;
            return `<div onclick="toggleLotServi('${lot.id}');" style="display:flex;align-items:center;gap:.55rem;padding:.6rem .7rem;border-top:${i>0?'1px solid var(--bord)':'none'};cursor:pointer;background:${servi?'#f0fdf4':'#fff'}">
              <input type="checkbox" ${servi?'checked':''} onclick="event.stopPropagation();toggleLotServi('${lot.id}');" style="width:22px;height:22px;accent-color:var(--vert-f);flex-shrink:0;cursor:pointer">
              <div style="flex:1;min-width:0">
                <div style="font-size:.9rem;font-weight:600;${servi?'text-decoration:line-through;color:var(--gris)':''}">${lot.nom}</div>
                <div style="font-size:.68rem;color:var(--gris)">${lot.nb||0} ch. · ${kgLot.toFixed(0)} kg au bol${facteurs[lot.id]?' ⚖️':''}</div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                ${servi
                  ? `<div style="font-size:.75rem;color:var(--vert-c);font-weight:700">✓ Distribué</div>`
                  : `<div style="font-size:.75rem;color:var(--gris)">→ reste après</div>
                     <div style="font-family:monospace;font-size:1rem;font-weight:700;color:${kgApres<0?'#c0392b':'var(--vert-f)'}">${kgApres.toFixed(0)} kg</div>`
                }
              </div>
            </div>`;
          }).join('');
        })()}
      </div>
    </div>

    <!-- DÉTAIL PAR LOT -->
    <div class="card">
      <div class="card-title">📊 Détail par lot</div>
      ${nbLotsInactifs>0?`<div style="font-size:.72rem;background:#fff3e0;color:#e65100;border-radius:6px;padding:3px 9px;margin-bottom:.6rem;display:inline-block;font-weight:600">⚠️ ${nbLotsInactifs} lot(s) exclu(s) — voir Chargement</div>`:''}
      ${lotsAvecRation.map(lot=>{
        const isActif = actifs[lot.id] !== false;
        const f = getFacteurLot(lot.id);
        const totalBolLot  = (lot.ration||[]).filter(a=>checked[a.nom]!==false).reduce((s,a)=>s+a.qte*f, 0);
        const totalHorsLot = (lot.ration||[]).filter(a=>checked[a.nom]===false).reduce((s,a)=>s+a.qte,   0);
        const nb = lot.nb||0;
        const aj = facteurs[lot.id];
        const factPct = aj ? Math.round((aj.facteur-1)*100) : null;
        const factCol = factPct>0 ? '#27ae60' : '#c0392b';
        return `<div style="padding:.55rem 0;border-bottom:1px solid var(--bord);opacity:${isActif?1:0.4}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:600;font-size:.9rem;${isActif?'':'text-decoration:line-through;color:var(--gris)'}">${lot.nom} <span style="font-weight:400;color:var(--gris);font-size:.75rem">${nb} ch.</span></span>
            <span style="font-family:monospace;font-weight:700;font-size:1rem;color:${isActif?'var(--vert-f)':'#bbb'}">${isActif?(totalBolLot*nb).toFixed(0):'—'} kg</span>
          </div>
          ${isActif?`<div style="font-size:.72rem;color:var(--gris);margin-top:3px;display:flex;gap:.5rem;flex-wrap:wrap">
            <span>🪣 ${totalBolLot.toFixed(2)} kg/tête</span>
            ${totalHorsLot>0?`<span style="color:#e65100">🤖 Robot : ${totalHorsLot.toFixed(2)} kg/tête</span>`:''}
            ${aj?`<span style="color:${factCol};font-weight:600;background:${factCol}18;border-radius:4px;padding:0 5px">⚖️ ${factPct>0?'+':''}${factPct}% · Refus ${aj.refusPct.toFixed(1)}%</span>`:''}
          </div>`:`<div style="font-size:.72rem;color:#e65100;margin-top:2px">Exclu aujourd'hui</div>`}
        </div>`;
      }).join('')}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.6rem;padding:.7rem .8rem;background:var(--vert-f);border-radius:10px">
        <div style="font-weight:700;color:#fff;font-size:.95rem">🪣 Total bol</div>
        <div style="font-family:monospace;font-weight:800;font-size:1.3rem;color:#fff">${totalBol.toFixed(0)} kg</div>
      </div>
      ${totalRobot>0?`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:.4rem;padding:.55rem .8rem;background:#fff3e0;border-radius:10px;border:1px solid #ffcc80">
        <div style="font-weight:700;color:#e65100;font-size:.9rem">🤖 Hors bol</div>
        <div style="font-family:monospace;font-weight:700;font-size:1.1rem;color:#e65100">${totalRobot.toFixed(0)} kg</div>
      </div>`:''}
    </div>`;
}

let refusMode = 'kg';
let refusHistorique = {}; // {date: {lotId: {kg, pct}}}

window.setRefusMode = (mode)=>{ refusMode=mode; renderRefus(); };

// Charger l'historique des 7 derniers jours
async function chargerHistoriqueRefus(){
  if(!uid) return;
  const dates = [];
  for(let i=1;i<=7;i++){
    const d = new Date(); d.setDate(d.getDate()-i);
    dates.push(d.toISOString().split('T')[0]);
  }
  for(const date of dates){
    try{
      const snap = await getDoc(doc(db,`users/${uid}/capration/refus_${date}`));
      if(snap.exists()) refusHistorique[date] = snap.data()||{};
    } catch(e){}
  }
  renderRefus();
}

function getStatutRefus(pct){
  const p = parseFloat(pct)||0;
  if(p===0)   return {col:'#9e9e9e', bg:'#f5f5f5', label:'Non saisi',   icon:'—'};
  if(p<6)     return {col:'#c0392b', bg:'#fdecea', label:'Trop faible', icon:'⚠️'};
  if(p<=10)   return {col:'#2e7d32', bg:'#e8f5e9', label:'Optimal',     icon:'✅'};
  if(p<=15)   return {col:'#d68910', bg:'#fff3e0', label:'Élevé',       icon:'⚠️'};
  return       {col:'#c0392b', bg:'#fdecea', label:'Trop élevé',icon:'🚨'};
}

function miniSparkline(lotId, lots7j){
  // Barres des 7 derniers jours (du plus vieux au plus récent)
  const dates = Object.keys(lots7j).sort();
  if(!dates.length) return '';
  const maxPct = 20;
  const bars = dates.map(date=>{
    const d = lots7j[date];
    const pct = parseFloat(d?.pct)||0;
    const h = Math.min(pct/maxPct*100,100);
    const {col} = getStatutRefus(pct);
    return `<div title="${date}: ${pct}%" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="font-size:6px;color:#bbb">${date.slice(8)}</div>
      <div style="width:100%;height:32px;display:flex;align-items:flex-end">
        <div style="width:100%;height:${h}%;background:${col};border-radius:2px 2px 0 0;min-height:2px"></div>
      </div>
      <div style="font-size:6px;color:${col};font-weight:700">${pct>0?pct+'%':''}</div>
    </div>`;
  }).join('');
  return `<div style="margin-top:.6rem">
    <div style="font-size:.65rem;color:var(--gris);margin-bottom:.3rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Historique 7 jours</div>
    <div style="display:flex;gap:3px;align-items:flex-end;height:52px">${bars}</div>
    <div style="display:flex;justify-content:space-between;margin-top:.25rem">
      <span style="font-size:.62rem;color:#2e7d32">✅ Optimal 6-10%</span>
      <span style="font-size:.62rem;color:#d68910">⚠️ Élevé >10%</span>
      <span style="font-size:.62rem;color:#c0392b">🚨 >15%</span>
    </div>
  </div>`;
}

            <div style="font-size:.7rem;color:${statut.col}">${statut.label}</div>
          </div>
          ${parseFloat(pct)<6&&valKg>0?`<div style="font-size:.65rem;color:#c0392b;text-align:right">Risque acidose<br>↑ Augmenter ration</div>`:
            parseFloat(pct)>15?`<div style="font-size:.65rem;color:#c0392b;text-align:right">Réduire la ration<br>ou vérifier appétit</div>`:
            parseFloat(pct)>10?`<div style="font-size:.65rem;color:#d68910;text-align:right">Surveiller<br>tendance</div>`:''}
        </div>`:''}

        <div class="refus-form">
          <span class="refus-label">Saisir refus</span>
          <input class="refus-input" type="number" id="refus-${lot.id}"
            value="${valSaisie}" placeholder="0" min="0" step="${refusMode==='pct'?'0.5':'1'}">
          <span class="refus-unit">${refusMode==='kg'?'kg':'%'}</span>
        </div>
        <button class="btn-save" style="width:100%;margin-top:.5rem;padding:.7rem" onclick="sauvegarderRefus(${lot.id},${totalRation.toFixed(1)})">
          💾 Enregistrer
        </button>
        ${miniSparkline(lot.id, histo7)}
      </div>`;
    }).join('')}`;
}

window.sauvegarderRefus = async(lotId, totalRation)=>{
  const lot = lotsData.find(l=>l.id===lotId);
  if(!lot) return;
  const raw = parseFloat(document.getElementById(`refus-${lotId}`)?.value)||0;
  const kg  = refusMode==='pct' ? totalRation*raw/100 : raw;
  const pct = totalRation>0 ? (kg/totalRation*100).toFixed(1) : 0;
  if(!refusData[lotId]) refusData[lotId]={};
  refusData[lotId] = {valeur:raw, kg, pct, mode:refusMode};
  const today = todayStr();
  try{
    await setDoc(doc(db,`users/${uid}/capration/refus_${today}`), refusData);
    const statut = getStatutRefus(pct);
    showToast(`${statut.icon} ${lot.nom} : ${kg.toFixed(1)} kg (${pct}%) — ${statut.label}`);
  } catch(e){
    localStorage.setItem('cap3_mobile_refus_'+today, JSON.stringify(refusData));
    showToast(`💾 Sauvegardé en local`);
  }
  renderRefus();
};

// ══ UTILS ══
function todayStr(){ return new Date().toISOString().split('T')[0]; }

function setSyncStatus(txt, cls){
  const el = document.getElementById('sync-status');
  el.textContent = txt;
  el.className = 'topbar-status'+(cls?' '+cls:'');
}

function showToast(msg){
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

// ══ SYNC DEPUIS PC (lecture clé localStorage partagée via URL hash) ══
// CAPRation PC peut encoder les lots dans l'URL pour un transfert rapide
const hash = location.hash.slice(1);
if(hash.startsWith('lots=')){
  try{
    lotsData = JSON.parse(decodeURIComponent(hash.slice(5)));
    localStorage.setItem('cap3_mobile_lots', JSON.stringify(lotsData));
    location.hash='';
    renderAll();
  } catch(e){}
}
</script>
